  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --radius-card: 32px;
      --radius-pill: 999px;
      --radius-button: 40px;

      --border-soft: 1px solid rgba(255, 255, 255, 0.08);
      --border-accent: 1px solid rgba(234, 88, 12, 0.30);
      --border-quiet: 1px solid rgba(255, 255, 255, 0.10);

      --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
      --dur-fast: 0.3s;
      --dur-med: 0.4s;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(234, 88, 12, 0.08), transparent 38%),
        #0A0A0C;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .shell {
      background: rgba(18, 18, 24, 0.62);
      backdrop-filter: blur(14px);
      border: var(--border-soft);
      border-radius: var(--radius-card);
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: var(--border-soft);
      border-radius: var(--radius-pill);
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      color: #9A9AA4;
      margin-bottom: 28px;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #EA580C;
    }

    .logo {
      display: inline-block;
      text-decoration: none;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 0.95;
      color: #FFFFFF;
      margin-bottom: 24px;
      -webkit-tap-highlight-color: transparent;
    }

    .logo span {
      color: #EA580C;
      margin-left: 2px;
    }

    .logo:focus {
      outline: none;
    }

    .logo:focus-visible {
      outline: 2px solid rgba(234, 88, 12, 0.5);
      outline-offset: 6px;
      border-radius: 12px;
    }

    .code {
      font-size: 140px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -4px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #EA580C 0%, #FF8A4C 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.6px;
      line-height: 1.1;
      margin-bottom: 16px;
      text-wrap: balance;
    }

    .desc {
      max-width: 560px;
      margin: 0 auto 36px;
      font-size: 17px;
      color: #9A9AA4;
      line-height: 1.65;
      text-wrap: balance;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 14px 24px;
      border-radius: var(--radius-button);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition:
        transform var(--dur-fast) var(--ease-standard),
        background-color var(--dur-fast) var(--ease-standard),
        border-color var(--dur-fast) var(--ease-standard),
        color var(--dur-fast) var(--ease-standard),
        box-shadow var(--dur-fast) var(--ease-standard);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .action-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      flex-shrink: 0;
    }

    .action-btn:focus {
      outline: none;
    }

    .action-btn:focus-visible {
      outline: 2px solid rgba(234, 88, 12, 0.55);
      outline-offset: 4px;
    }

    .action-btn-primary {
      background: rgba(234, 88, 12, 0.12);
      border: var(--border-accent);
      color: #EA580C;
      box-shadow: 0 10px 24px rgba(234, 88, 12, 0.08);
    }

    .action-btn-primary:hover {
      background: rgba(234, 88, 12, 0.20);
      border-color: rgba(234, 88, 12, 0.45);
      transform: translateY(-2px);
    }

    .action-btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      border: var(--border-quiet);
      color: #FFFFFF;
    }

    .action-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-2px);
    }

    .hint {
      font-size: 13px;
      color: #6A6A78;
      line-height: 1.6;
      text-wrap: balance;
    }

    @media (max-width: 768px) {
      body {
        padding: 24px 16px;
      }

      .shell {
        padding: 36px 22px 28px;
        border-radius: 28px;
      }

      .badge {
        margin-bottom: 24px;
      }

      .logo {
        font-size: 42px;
        margin-bottom: 20px;
      }

      .code {
        font-size: 100px;
        letter-spacing: -3px;
        margin-bottom: 16px;
      }

      .title {
        font-size: 26px;
      }

      .desc {
        font-size: 15px;
        margin-bottom: 28px;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .action-btn {
        width: 100%;
      }
    }

    /* Maxim: уважение к prefers-reduced-motion — обязательно по Кодексу */
    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
        scroll-behavior: auto !important;
      }

      .action-btn-primary:hover,
      .action-btn-secondary:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="shell" aria-labelledby="page-title">
      <div class="badge">Ошибка 404</div>

      <a href="https://digitcalc.ru/" class="logo" aria-label="Перейти на главную DIGIT.">
        DIGIT<span>.</span>
      </a>

      <div class="code" aria-hidden="true">404</div>

      <h1 class="title" id="page-title">Страница не найдена</h1>

      <p class="desc">
        Ссылка могла устареть или адрес был изменён.<br>
        Вернитесь на главную DIGIT. или откройте DIGIT. Lite для быстрого расчёта рекламных кампаний.
      </p>

      <div class="actions">
        <a href="https://digitcalc.ru/" class="action-btn action-btn-primary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10.5L12 3l9 7.5"></path>
            <path d="M5 9.5V21h14V9.5"></path>
          </svg>
          На главную
        </a>

        <a href="https://digitcalc.ru/lite/" class="action-btn action-btn-secondary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="M13 6l6 6-6 6"></path>
          </svg>
          Открыть DIGIT. Lite
        </a>
      </div>

      <div class="hint">
        Быстро посчитать. Понятно показать. Легко принять решение.
      </div>
    </section>
  </main>
</body>
</html>
