<head>

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="DIGIT. — Страница не найдена">
  <meta name="twitter:description" content="Ссылка могла устареть или адрес был изменён. Вернитесь на главную DIGIT.">
  <meta name="twitter:image" content="https://digitcalc.ru/og-main.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="DIGIT">
  <link rel="manifest" href="/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --radius-card: 32px;
      --radius-button: 40px;
      --radius-focus: 12px;

      --border-soft: 1px solid rgba(255, 255, 255, 0.08);
      --border-accent: 1px solid rgba(234, 88, 12, 0.30);

      --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
      --dur-fast: 0.3s;
      --dur-med: 0.4s;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(234, 88, 12, 0.06), transparent 36%),
        #0A0A0C;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }

    .shell {
      background: rgba(18, 18, 24, 0.58);
      backdrop-filter: blur(12px);
      border: var(--border-soft);
      border-radius: var(--radius-card);
      padding: 56px 44px 48px;
      text-align: center;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.24);
    }

    .logo {
      display: inline-block;
      text-decoration: none;
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 0.95;
      color: #FFFFFF;
      margin-bottom: 28px;
      -webkit-tap-highlight-color: transparent;
    }

    .logo span {
      color: #EA580C;
      margin-left: 2px;
    }

    .logo:focus {
      outline: none;
    }

    .logo:focus-visible {
      outline: 2px solid rgba(234, 88, 12, 0.5);
      outline-offset: 6px;
      border-radius: var(--radius-focus);
    }

    .code {
      font-size: 132px;
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -4px;
      color: #EA580C;
      margin-bottom: 22px;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.6px;
      line-height: 1.1;
      margin-bottom: 16px;
      text-wrap: balance;
    }

    .desc {
      max-width: 560px;
      margin: 0 auto 34px;
      font-size: 17px;
      color: #9A9AA4;
      line-height: 1.65;
      text-wrap: balance;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 54px;
      padding: 14px 26px;
      border-radius: var(--radius-button);
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition:
        transform var(--dur-fast) var(--ease-standard),
        background-color var(--dur-fast) var(--ease-standard),
        border-color var(--dur-fast) var(--ease-standard),
        color var(--dur-fast) var(--ease-standard),
        box-shadow var(--dur-fast) var(--ease-standard);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .action-btn svg,
    .secondary-link svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      flex-shrink: 0;
    }

    .action-btn:focus,
    .secondary-link:focus {
      outline: none;
    }

    .action-btn:focus-visible,
    .secondary-link:focus-visible {
      outline: 2px solid rgba(234, 88, 12, 0.55);
      outline-offset: 4px;
    }

    .action-btn-primary {
      background: rgba(234, 88, 12, 0.12);
      border: var(--border-accent);
      color: #EA580C;
      box-shadow: 0 10px 24px rgba(234, 88, 12, 0.08);
    }

    .action-btn-primary:hover {
      background: rgba(234, 88, 12, 0.18);
      border-color: rgba(234, 88, 12, 0.42);
      transform: translateY(-2px);
    }

    .secondary-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      color: #C7C7CF;
      transition:
        color var(--dur-fast) var(--ease-standard),
        transform var(--dur-fast) var(--ease-standard);
      -webkit-tap-highlight-color: transparent;
    }

    .secondary-link:hover {
      color: #FFFFFF;
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      body {
        padding: 24px 16px;
      }

      .container {
        max-width: 100%;
      }

      .shell {
        padding: 38px 22px 32px;
        border-radius: 28px;
      }

      .logo {
        font-size: 40px;
        margin-bottom: 22px;
      }

      .code {
        font-size: 96px;
        letter-spacing: -3px;
        margin-bottom: 18px;
      }

      .title {
        font-size: 26px;
      }

      .desc {
        font-size: 15px;
        margin-bottom: 28px;
      }

      .action-btn {
        width: 100%;
      }

      .secondary-link {
        min-height: 24px;
      }
    }

    /* Maxim: уважение к prefers-reduced-motion — обязательно по Кодексу */
    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
        scroll-behavior: auto !important;
      }

      .action-btn-primary:hover,
      .secondary-link:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="shell" aria-labelledby="page-title">
      <a href="/" class="logo" aria-label="Перейти на главную DIGIT.">
        DIGIT<span>.</span>
      </a>

      <div class="code" aria-hidden="true">404</div>

      <h1 class="title" id="page-title">Страница не найдена</h1>

      <p class="desc">
        Ссылка могла устареть или адрес был изменён.
        Вернитесь на главную или откройте DIGIT. Lite для быстрого расчёта рекламных кампаний.
      </p>

      <div class="actions">
        <a href="/" class="action-btn action-btn-primary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10.5L12 3l9 7.5"></path>
            <path d="M5 9.5V21h14V9.5"></path>
          </svg>
          На главную
        </a>

        <a href="/lite/" class="secondary-link">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="M13 6l6 6-6 6"></path>
          </svg>
          Открыть DIGIT. Lite
        </a>
      </div>
    </section>
  </main>
</body>
</html>
